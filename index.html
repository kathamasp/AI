<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Automation Specialist — Project Tasklist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0A0A0F;
      font-family: 'Segoe UI', Tahoma, 'TH Sarabun New', sans-serif;
      color: #E2E8F0;
      padding: 32px 20px 60px;
    }

    .container { max-width: 760px; margin: 0 auto; }

    /* ── Header card ── */
    .header-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 1px solid #2D3748;
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .header-label {
      font-size: 11px; color: #64748B;
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px;
    }
    .header-title { font-size: 26px; font-weight: 700; color: #F1F5F9; line-height: 1.3; }
    .header-sub { font-size: 14px; color: #94A3B8; margin-top: 6px; }

    /* ── Progress ── */
    .progress-wrap { margin-top: 24px; }
    .progress-row {
      display: flex; justify-content: space-between; margin-bottom: 8px;
      font-size: 13px; color: #94A3B8;
    }
    .progress-count { font-weight: 700; color: #00D4FF; }
    .progress-bar-bg {
      background: #1E293B; border-radius: 99px; height: 8px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00D4FF, #7C3AED);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── Phase card ── */
    .phase-card {
      background: #0F172A;
      border-radius: 14px;
      margin-bottom: 16px;
      overflow: hidden;
      border: 1px solid transparent;
    }

    .phase-header {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 24px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: background 0.2s;
    }

    .phase-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .phase-meta { flex: 1; }
    .phase-label {
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; font-weight: 600;
    }
    .phase-title { font-size: 16px; font-weight: 600; color: #F1F5F9; margin-top: 2px; }
    .phase-count { font-size: 12px; font-weight: 600; color: #64748B; }
    .phase-arrow {
      color: #475569; font-size: 12px;
      transition: transform 0.25s;
      display: inline-block;
    }
    .phase-arrow.open { transform: rotate(180deg); }

    /* ── Task body ── */
    .phase-body { padding: 16px 24px 20px; }
    .task-group { margin-bottom: 20px; }
    .task-group-title {
      font-size: 13px; font-weight: 600; color: #94A3B8;
      letter-spacing: 0.5px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .task-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .subtask-list { display: flex; flex-direction: column; gap: 6px; }
    .subtask-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #1E293B;
      border: 1px solid #2D3748;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .subtask-item.done { background: transparent; }

    .checkbox {
      width: 18px; height: 18px; border-radius: 5px;
      border: 2px solid #475569;
      background: transparent;
      flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 11px; font-weight: 900;
      color: #000;
    }

    .subtask-text {
      font-size: 14px; color: #CBD5E1;
      line-height: 1.55;
      transition: color 0.2s;
    }
    .subtask-item.done .subtask-text {
      color: #64748B;
      text-decoration: line-through;
    }

    /* ── Tech stack ── */
    .stack-card {
      background: #0F172A;
      border: 1px solid #1E293B;
      border-radius: 14px;
      padding: 20px 24px;
      margin-top: 8px;
    }
    .stack-label {
      font-size: 11px; color: #64748B;
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
    }
    .stack-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .stack-tag {
      font-size: 12px; padding: 5px 12px;
      border-radius: 99px; font-weight: 500;
    }

    /* collapsed */
    .phase-body { display: block; }
    .phase-body.collapsed { display: none; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header-card">
    <div class="header-label">Project Blueprint</div>
    <h1 class="header-title">AI Automation Specialist</h1>
    <div class="header-sub">Chatbot · Pre-order System · Status Tracking · Ads Analytics</div>
    <div class="progress-wrap">
      <div class="progress-row">
        <span>Overall Progress</span>
        <span class="progress-count" id="progress-text">0/45 tasks · 0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>

  <!-- Phases injected by JS -->
  <div id="phases-container"></div>

  <!-- Tech Stack -->
  <div class="stack-card">
    <div class="stack-label">Tech Stack ที่ต้องใช้</div>
    <div class="stack-tags" id="stack-tags"></div>
  </div>

</div>

<script>
const phases = [
  {
    id: 1, phase: "Phase 1", title: "Setup & เครื่องมือพื้นฐาน",
    color: "#00D4FF", icon: "⚙️",
    tasks: [
      { id: "1-1", title: "เปิดบัญชีและเชื่อมต่อ Platform", subtasks: [
        "สมัคร ManyChat หรือ UChat (เลือก 1 ตัว)",
        "สมัคร Make.com หรือ Zapier (เลือก 1 ตัว)",
        "เตรียม OpenAI API Key (หรือ Claude / Gemini)",
        "เตรียม Google Sheet ต้นแบบสำหรับรับข้อมูลออเดอร์",
        "เชื่อมต่อ IG Business Account กับ ManyChat/UChat",
      ]},
      { id: "1-2", title: "เตรียม Knowledge Base", subtasks: [
        "รวบรวม URL สินค้าจากเว็บไซต์/IG ทั้งหมด",
        "จัดทำไฟล์ข้อมูลสินค้า (สเปก, ราคา, ระยะเวลา Pre-order แต่ละรุ่น)",
        "Upload ข้อมูลเข้า OpenAI Assistant หรือสร้าง Vector Store",
        "ทดสอบ AI ตอบคำถามสินค้าเบื้องต้น",
      ]},
    ],
  },
  {
    id: 2, phase: "Phase 2", title: "AI Chatbot สำหรับปิดการขาย",
    color: "#7C3AED", icon: "🤖",
    tasks: [
      { id: "2-1", title: "สร้าง Chatbot Flow หลัก", subtasks: [
        "ออกแบบ Flow: ลูกค้าทักมา → AI ถามความต้องการ",
        "เชื่อม ManyChat/UChat → OpenAI API (ผ่าน Make.com)",
        "ตั้งค่า AI ดึงข้อมูลจาก Knowledge Base ตอบสเปกสินค้า",
        "สร้าง Flow: AI สรุปยอดเงิน + แจ้งข้อมูลการโอน",
        "ทดสอบ End-to-End: ถามสินค้า → ตัดสินใจซื้อ → แจ้งยอด",
      ]},
      { id: "2-2", title: "ระบบตรวจสอบสลิป (AI Vision)", subtasks: [
        "เชื่อม Flow รับรูปสลิปจากลูกค้า",
        "ส่งรูปสลิปให้ OpenAI Vision API ตรวจยอดเงิน/วันเวลา",
        "สร้าง Logic: ยอดถูก → ดำเนินการต่อ / ยอดผิด → แจ้งลูกค้า",
        "ทดสอบตรวจสลิปจริงหลายรูปแบบ",
      ]},
      { id: "2-3", title: "Pre-order: บันทึกข้อมูลลง Google Sheet", subtasks: [
        "สอน AI เรื่อง Pre-order และระยะเวลารอแต่ละรุ่น",
        "สร้าง Flow ดึงชื่อ-ที่อยู่ลูกค้าหลังสลิปผ่าน",
        "เชื่อม Make.com → Google Sheet (เพิ่มแถวใหม่อัตโนมัติ)",
        "กำหนด Default Status = 'Pending / Pre-ordering'",
        "ให้บอทส่งข้อความยืนยันคิวให้ลูกค้าทันที",
        "ทดสอบ Flow ครบวงจร Pre-order",
      ]},
    ],
  },
  {
    id: 3, phase: "Phase 3", title: "Status Tracking System",
    color: "#10B981", icon: "📦",
    tasks: [
      { id: "3-1", title: "ระบบแจ้งสถานะอัตโนมัติ (Trigger-based)", subtasks: [
        "ออกแบบคอลัมน์สถานะใน Google Sheet (กำลังผลิต / ถึงไทยแล้ว / กำลังแพ็ก / จัดส่งแล้ว)",
        "สร้าง Trigger ใน Make.com: เมื่อ Status ใน Sheet เปลี่ยน → ส่งข้อความ",
        "เขียนเทมเพลตข้อความแต่ละสถานะ (ภาษาสวย, ชื่อลูกค้า)",
        "เชื่อม Trigger → ส่งข้อความผ่าน ManyChat/UChat ไปหาลูกค้าใน IG",
        "ทดสอบเปลี่ยนสถานะแล้วลูกค้าได้รับแจ้งเตือน",
      ]},
      { id: "3-2", title: "Self-Service: ลูกค้าเช็กสถานะเอง", subtasks: [
        "ออกแบบ Rich Menu (LINE) หรือ Quick Reply (IG) ปุ่ม 'เช็กสถานะ'",
        "สร้าง Flow: ลูกค้ากด → บอทถามชื่อ/เลขออเดอร์",
        "เชื่อม Make.com ค้นหาข้อมูลใน Google Sheet",
        "บอทตอบสถานะล่าสุดให้ลูกค้า",
        "ทดสอบ Self-Service Flow",
      ]},
    ],
  },
  {
    id: 4, phase: "Phase 4", title: "Ads Tracking & AI Analytics",
    color: "#F59E0B", icon: "📊",
    tasks: [
      { id: "4-1", title: "ดึงข้อมูล Meta Ads เข้า Google Sheet", subtasks: [
        "เลือกวิธีดึงข้อมูล: Supermetrics หรือ Meta Ads API โดยตรง",
        "ตั้ง Automation ดึงข้อมูลทุกเช้า 08:00 น.",
        "สร้างตาราง: Spend, Reach, Clicks, ต้นทุนต่อทัก แต่ละแคมเปญ",
        "เชื่อมข้อมูลยอดจอง (Sheet ออเดอร์) กับ Sheet Ads",
      ]},
      { id: "4-2", title: "AI วิเคราะห์และส่งสรุปรายวัน", subtasks: [
        "สร้าง Automation ส่งข้อมูล Ads ให้ AI วิเคราะห์",
        "ให้ AI สรุปสั้นๆ: แอดไหนคุ้ม / ควรเพิ่ม/ลดงบ",
        "ให้ AI ระบุสินค้าที่ 'ทักเยอะแต่ไม่จอง'",
        "ส่งสรุปเข้า LINE Group ทีมบริหารอัตโนมัติทุกเช้า",
        "ทดสอบ Workflow ทั้งหมด",
      ]},
    ],
  },
  {
    id: 5, phase: "Phase 5", title: "ทดสอบและ Go Live",
    color: "#EF4444", icon: "🚀",
    tasks: [
      { id: "5-1", title: "UAT & ปรับแต่ง", subtasks: [
        "ทดสอบ Full Flow ทุกระบบพร้อมกัน",
        "ทดสอบ Edge Cases: ลูกค้าถามนอกเรื่อง, สลิปไม่ชัด, ยอดผิด",
        "ปรับภาษา/โทนของ AI ให้เป็นธรรมชาติ ตามสไตล์ร้าน",
        "ฝึกสอนแอดมินใช้งาน Dashboard และเปลี่ยนสถานะ Sheet",
        "จัดทำคู่มือการใช้งาน",
      ]},
      { id: "5-2", title: "Launch & Monitor", subtasks: [
        "เปิดใช้งานระบบจริง (Go Live)",
        "Monitor 7 วันแรก: Error, ลูกค้าสับสน, ช่องโหว่",
        "ปรับ Knowledge Base เพิ่มเติมตามคำถามที่พบบ่อย",
        "ตั้ง Alert เมื่อระบบ Error หรือ API หมด Quota",
      ]},
    ],
  },
];

const techStack = [
  { label: "Make.com / Zapier",          color: "#F59E0B" },
  { label: "ManyChat / UChat",           color: "#00D4FF" },
  { label: "OpenAI / Claude / Gemini",   color: "#7C3AED" },
  { label: "Google Sheets",             color: "#10B981" },
  { label: "Meta Ads API / Supermetrics",color: "#EF4444" },
  { label: "LINE Notify",               color: "#10B981" },
  { label: "OpenAI Vision API",         color: "#7C3AED" },
];

// ── State (persisted via localStorage) ──────────────────────────────
const STORAGE_KEY = "ai-tasklist-checked-v1";
let checked = {};
try { checked = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) {}

function saveChecked() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); } catch(e) {}
}

// ── Helpers ──────────────────────────────────────────────────────────
function hex2rgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Compute totals ────────────────────────────────────────────────────
const allKeys = [];
phases.forEach(p => p.tasks.forEach(t => t.subtasks.forEach((_,si) => allKeys.push(`${t.id}-${si}`))));
const totalTasks = allKeys.length;

function countDone() { return allKeys.filter(k => checked[k]).length; }

function updateProgress() {
  const done = countDone();
  const pct = Math.round((done / totalTasks) * 100);
  document.getElementById("progress-text").textContent = `${done}/${totalTasks} tasks · ${pct}%`;
  document.getElementById("progress-fill").style.width = pct + "%";
}

// ── Render tech stack ─────────────────────────────────────────────────
const stackContainer = document.getElementById("stack-tags");
techStack.forEach(t => {
  const span = document.createElement("span");
  span.className = "stack-tag";
  span.textContent = t.label;
  span.style.background = hex2rgba(t.color, 0.12);
  span.style.border = `1px solid ${hex2rgba(t.color, 0.4)}`;
  span.style.color = t.color;
  stackContainer.appendChild(span);
});

// ── Render phases ─────────────────────────────────────────────────────
const container = document.getElementById("phases-container");

phases.forEach(phase => {
  const phaseKeys = [];
  phase.tasks.forEach(t => t.subtasks.forEach((_,si) => phaseKeys.push(`${t.id}-${si}`)));

  // Card wrapper
  const card = document.createElement("div");
  card.className = "phase-card";
  card.style.borderColor = hex2rgba(phase.color, 0.15);

  // ── Phase header ──
  const header = document.createElement("div");
  header.className = "phase-header";
  header.style.background = hex2rgba(phase.color, 0.04);
  header.style.borderBottomColor = hex2rgba(phase.color, 0.15);

  // icon
  const iconBox = document.createElement("div");
  iconBox.className = "phase-icon";
  iconBox.textContent = phase.icon;
  iconBox.style.background = hex2rgba(phase.color, 0.12);
  iconBox.style.border = `1px solid ${hex2rgba(phase.color, 0.3)}`;

  // meta
  const meta = document.createElement("div");
  meta.className = "phase-meta";
  const lbl = document.createElement("div");
  lbl.className = "phase-label";
  lbl.textContent = phase.phase;
  lbl.style.color = phase.color;
  const ttl = document.createElement("div");
  ttl.className = "phase-title";
  ttl.textContent = phase.title;
  meta.appendChild(lbl);
  meta.appendChild(ttl);

  // right side
  const right = document.createElement("div");
  right.style.display = "flex";
  right.style.alignItems = "center";
  right.style.gap = "12px";

  const countEl = document.createElement("span");
  countEl.className = "phase-count";
  function refreshPhaseCount() {
    const done = phaseKeys.filter(k => checked[k]).length;
    countEl.textContent = `${done}/${phaseKeys.length}`;
    countEl.style.color = done === phaseKeys.length ? phase.color : "#64748B";
  }
  refreshPhaseCount();

  const arrow = document.createElement("span");
  arrow.className = "phase-arrow open";
  arrow.textContent = "▼";

  right.appendChild(countEl);
  right.appendChild(arrow);
  header.appendChild(iconBox);
  header.appendChild(meta);
  header.appendChild(right);

  // ── Body ──
  const body = document.createElement("div");
  body.className = "phase-body";

  phase.tasks.forEach(task => {
    const group = document.createElement("div");
    group.className = "task-group";

    const gtitle = document.createElement("div");
    gtitle.className = "task-group-title";
    const dot = document.createElement("div");
    dot.className = "task-dot";
    dot.style.background = phase.color;
    gtitle.appendChild(dot);
    gtitle.appendChild(document.createTextNode(task.title));
    group.appendChild(gtitle);

    const list = document.createElement("div");
    list.className = "subtask-list";

    task.subtasks.forEach((sub, si) => {
      const key = `${task.id}-${si}`;

      const item = document.createElement("div");
      item.className = "subtask-item" + (checked[key] ? " done" : "");
      item.style.borderColor = checked[key] ? hex2rgba(phase.color, 0.25) : "#2D3748";
      if (checked[key]) item.style.background = hex2rgba(phase.color, 0.07);

      const box = document.createElement("div");
      box.className = "checkbox";
      box.style.borderColor = checked[key] ? phase.color : "#475569";
      box.style.background = checked[key] ? phase.color : "transparent";
      if (checked[key]) box.textContent = "✓";

      const text = document.createElement("span");
      text.className = "subtask-text";
      text.textContent = sub;

      item.appendChild(box);
      item.appendChild(text);

      item.addEventListener("click", () => {
        checked[key] = !checked[key];
        saveChecked();

        item.classList.toggle("done", !!checked[key]);
        item.style.borderColor = checked[key] ? hex2rgba(phase.color, 0.25) : "#2D3748";
        item.style.background = checked[key] ? hex2rgba(phase.color, 0.07) : "#1E293B";
        box.style.borderColor = checked[key] ? phase.color : "#475569";
        box.style.background = checked[key] ? phase.color : "transparent";
        box.textContent = checked[key] ? "✓" : "";

        refreshPhaseCount();
        updateProgress();
      });

      list.appendChild(item);
    });

    group.appendChild(list);
    body.appendChild(group);
  });

  // ── Toggle collapse ──
  header.addEventListener("click", () => {
    const isOpen = !body.classList.contains("collapsed");
    body.classList.toggle("collapsed", isOpen);
    arrow.classList.toggle("open", !isOpen);
    header.style.borderBottomColor = isOpen ? "transparent" : hex2rgba(phase.color, 0.15);
  });

  card.appendChild(header);
  card.appendChild(body);
  container.appendChild(card);
});

// ── Initial progress ──────────────────────────────────────────────────
updateProgress();
</script>
</body>
</html>
